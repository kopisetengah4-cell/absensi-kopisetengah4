<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Kopi Setengah-4 v104 - High Security</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
    body { background-color: #0f172a; color: white; min-height: 100vh; margin: 0; }
    .container-mobile { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; }
    .card-v104 { background: #1e293b; border-radius: 18px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; }
    .field-v104 { background: #fff !important; color: #0f172a !important; width: 100%; border-radius: 12px; font-weight: 700; height: 50px; text-align: center; border: 2px solid #c29851; font-size: 14px; margin-bottom: 10px; outline: none; }
    .btn-full { width: 100%; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-weight: 800; height: 55px; text-transform: uppercase; cursor: pointer; transition: 0.2s; border: none; }
    .btn-green { background: #22c55e; color: #052e16; box-shadow: 0 4px 0 #15803d; }
    .btn-green:active { transform: translateY(4px); box-shadow: none; }
    
    .table-box { background: #0f172a; border-radius: 14px; overflow-x: auto; border: 1px solid #334155; }
    .table-v104 { width: 100%; border-collapse: collapse; min-width: 450px; }
    .table-v104 th { background: #1e293b; color: #c29851; padding: 12px 4px; font-size: 8px; text-transform: uppercase; }
    .table-v104 td { padding: 10px 4px; font-size: 9px; border-bottom: 1px solid #334155; text-align: center; }
    .lbl { padding: 3px 6px; border-radius: 4px; font-size: 7px; font-weight: 800; color: white; }
    .lbl-sukses { background: #16a34a; } .lbl-telat { background: #dc2626; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="flex justify-center">

<div class="container-mobile">
  <div id="home" class="py-20 text-center">
    <h1 class="text-4xl font-black text-[#c29851] italic tracking-tighter mb-10">KOPI SETENGAH-4</h1>
    <div class="card-v104">
        <button onclick="nav('karyawan')" class="btn-full btn-green mb-5">ABSEN SEKARANG</button>
        <button onclick="nav('admin')" class="btn-full bg-slate-700 text-slate-300">ADMIN PANEL</button>
    </div>
  </div>

  <div id="karyawan" class="hidden">
    <div class="card-v104 text-center">
        <h2 class="text-[#c29851] font-black mb-6 uppercase">ID Verification</h2>
        <input id="inputID" type="text" placeholder="MASUKKAN ID ANDA" class="field-v104">
        <button onclick="prosesLoginID()" class="btn-full btn-green">MULAI ABSEN</button>
        <button onclick="nav('home')" class="mt-4 text-xs text-slate-500 font-bold uppercase">Batal</button>
    </div>
  </div>

  <div id="formAbsen" class="hidden">
    <div class="card-v104">
        <h2 id="userDisplay" class="text-center text-[#c29851] font-black text-xl mb-4"></h2>
        <p class="text-center text-[10px] text-slate-400 mb-6 font-bold uppercase tracking-widest">Pilih Lokasi Cabang</p>
        <select id="selCabAbsen" class="field-v104" onchange="updateShiftList()"></select>
        <div id="listShift" class="space-y-3"></div>
        <div id="actionArea" class="hidden mt-8 border-t border-slate-700 pt-6">
            <button id="btnKirim" class="btn-full btn-green">KONFIRMASI KEHADIRAN</button>
        </div>
    </div>
  </div>

  <div id="dashboard" class="hidden pb-20">
    <div class="flex justify-between items-center py-4 mb-4">
      <h2 class="font-black text-[#c29851] text-xs">MONITORING SYSTEM v104</h2>
      <button onclick="nav('home')" class="text-red-500 font-bold text-[10px]">LOGOUT</button>
    </div>

    <div class="card-v104 !p-2">
      <div class="grid grid-cols-2 gap-2 mb-3">
        <select id="selCab" onchange="renderAll()" class="field-v104 !h-[35px] !mb-0 !text-[10px]"></select>
        <input type="date" id="selTgl" onchange="renderAll()" class="field-v104 !h-[35px] !mb-0 !text-[10px]">
      </div>
      <div class="table-box">
        <table class="table-v104">
            <thead><tr><th>NAMA</th><th>CAB</th><th>WAKTU</th><th>DEVICE ID</th><th>KET</th></tr></thead>
            <tbody id="tBodyHarian"></tbody>
        </table>
      </div>
    </div>
    </div>

  <div id="admin" class="hidden"><div class="card-v104 text-center"><input id="passAdmin" type="password" placeholder="PIN" class="field-v104"><button onclick="loginAdmin()" class="btn-full btn-green">LOGIN</button></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyChFAEgzpZac2yRvkb9r8f0kFT_j_ji1AA", authDomain: "absensi-kopi-setengah-4.firebaseapp.com", databaseURL: "https://absensi-kopi-setengah-4-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "absensi-kopi-setengah-4" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// KOORDINAT CABANG (Tambahkan lat/lng asli untuk akurasi radius)
const lokasiCabang = { 
    "Pondok Indah": { lat: -6.2697, lng: 106.7821, s1: 8 }, 
    "Menteng": { lat: -6.1912, lng: 106.8229, s1: 8 }, 
    "Cempaka Putih": { lat: -6.1755, lng: 106.8722, s1: 9 }, 
    "Tanjung Duren": { lat: -6.1746, lng: 106.7901, s1: 8, s2: 15 }, 
    "Otista": { lat: -6.2415, lng: 106.8694, s1: 8, s2: 15 }, 
    "Kebon Jeruk": { lat: -6.1925, lng: 106.7698, s1: 8, s2: 14 } 
};

const masterKaryawan = { "KS4-1902": "Adryan", "KS4-7721": "Riki", "KS4-3384": "Acong", "KS4-5510": "Oji", "KS4-8892": "David", "KS4-2104": "Fikri", "KS4-6637": "Rizki", "KS4-4429": "Kimoy", "KS4-9012": "Apin" };
let currentUser = null; let logs = [];

// GENERATE DEVICE FINGERPRINT (Simple version)
const getDeviceID = () => {
    let id = localStorage.getItem('ks4_device_token');
    if(!id) {
        id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('ks4_device_token', id);
    }
    return id;
};

// HITUNG JARAK (Haversine Formula)
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // metres
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.nav = (id) => {
    document.querySelectorAll('.container-mobile > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id === 'dashboard') startSync();
};

// LOGIN & DEVICE CHECK
window.prosesLoginID = async () => {
    const id = document.getElementById('inputID').value.trim().toUpperCase();
    if(!masterKaryawan[id]) return alert("ID TIDAK VALID!");

    const deviceID = getDeviceID();
    const userRef = ref(db, `users/${id}`);
    const snapshot = await get(userRef);

    if(snapshot.exists()) {
        if(snapshot.val().deviceID !== deviceID) {
            alert("DITOLAK! ID ini sudah terdaftar di HP lain. Dilarang titip absen!");
            nav('home'); return;
        }
    } else {
        await set(userRef, { nama: masterKaryawan[id], deviceID: deviceID });
    }

    currentUser = { id, nama: masterKaryawan[id], deviceID };
    document.getElementById('userDisplay').innerText = currentUser.nama;
    nav('formAbsen');
    buildCabangAbsen();
};

function buildCabangAbsen() {
    const s = document.getElementById('selCabAbsen');
    s.innerHTML = '<option value="">-- LOKASI CABANG --</option>';
    Object.keys(lokasiCabang).forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
}

window.updateShiftList = () => {
    const c = document.getElementById('selCabAbsen').value;
    const l = document.getElementById('listShift'); l.innerHTML = '';
    if(!c) return;
    const s = lokasiCabang[c].s2 ? [1,2] : [1];
    s.forEach(n => {
        l.innerHTML += `<button onclick="window.finalShift={c:'${c}',n:${n}}; document.getElementById('actionArea').classList.remove('hidden');" class="btn-full bg-slate-700 text-sm text-white mb-2">Shift ${n}</button>`;
    });
};

// KIRIM ABSEN DENGAN VALIDASI RADIUS & HARIAN
document.getElementById('btnKirim').onclick = async () => {
    const today = new Date().toLocaleDateString('id-ID');
    
    // 1. Cek Apakah sudah absen hari ini
    const logSnap = await get(ref(db, 'absensi'));
    let sudahAbsen = false;
    if(logSnap.exists()) {
        Object.values(logSnap.val()).forEach(log => {
            if(log.nama === currentUser.nama && log.tanggal === today) sudahAbsen = true;
        });
    }

    if(sudahAbsen) {
        alert("DITOLAK! Anda sudah absen hari ini.");
        nav('home'); return;
    }

    // 2. Cek Geofencing (200m)
    navigator.geolocation.getCurrentPosition((pos) => {
        const { c, n } = window.finalShift;
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, lokasiCabang[c].lat, lokasiCabang[c].lng);

        if(dist > 200) {
            alert(`DITOLAK! Jarak Anda ${Math.round(dist)}m dari cabang. Harus dalam radius 200m!`);
            nav('home'); return;
        }

        const now = new Date();
        const lim = lokasiCabang[c]['s'+n];
        const st = (now.getHours() > lim || (now.getHours() === lim && now.getMinutes() > 0)) ? "TELAT" : "TEPAT";

        set(push(ref(db, 'absensi')), {
            nama: currentUser.nama, cabang: c, shift: n, tanggal: today,
            waktu: now.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'}),
            ket: st, deviceId: currentUser.deviceID, lat: pos.coords.latitude, lng: pos.coords.longitude,
            timestamp: serverTimestamp()
        }).then(() => {
            alert("BERHASIL! Absen telah tercatat.");
            nav('home');
        });

    }, () => alert("Gagal mendapatkan lokasi. GPS WAJIB AKTIF!"));
};

// SYNC ADMIN & RENDER
function startSync() {
    onValue(ref(db, 'absensi'), (snap) => {
        logs = [];
        if(snap.exists()) Object.values(snap.val()).forEach(d => logs.push({...d, iso: new Date(d.timestamp).toISOString().split('T')[0]}));
        renderAll();
    });
}

window.renderAll = () => {
    const c = document.getElementById('selCab').value || 'Semua';
    const t = document.getElementById('selTgl').value || new Date().toISOString().split('T')[0];
    const body = document.getElementById('tBodyHarian'); if(!body) return;
    body.innerHTML = '';
    logs.filter(l => (c === 'Semua' || l.cabang === c) && l.iso === t).forEach(l => {
        body.innerHTML += `<tr><td class="font-bold">${l.nama}</td><td>${l.cabang.split(' ')[0]}</td><td>${l.waktu}</td><td class="text-slate-500">${l.deviceId}</td><td><span class="lbl ${l.ket==='TELAT'?'lbl-telat':'lbl-sukses'}">${l.ket}</span></td></tr>`;
    });
};

window.loginAdmin = () => { if(document.getElementById('passAdmin').value === 'setengah-4all') nav('dashboard'); else alert("Salah PIN!"); };
// Setup Awal Dropdown
const scA = document.getElementById('selCab'); scA.innerHTML = '<option value="Semua">SEMUA CABANG</option>';
Object.keys(lokasiCabang).forEach(c => scA.innerHTML += `<option value="${c}">${c}</option>`);
document.getElementById('selTgl').value = new Date().toISOString().split('T')[0];
</script>
</body>
  </html>
