<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kopi Setengah-4 v133 - System Fixed</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    :root { --gold: #c29851; --dark-bg: #0f172a; --card-bg: #1e293b; --border: #334155; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--dark-bg); color: #f8fafc; margin: 0; overflow-x: hidden; width: 100vw; }
    .main-container { width: 94%; margin: 0 auto; padding: 15px 0; position: relative; }
    
    .btn-back-global { position: absolute; top: 0; left: 0; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; display: flex; align-items: center; gap: 5px; padding: 5px 0; z-index: 50; }
    .glass-card { background: var(--card-bg); border-radius: 16px; padding: 18px; border: 1px solid var(--border); margin-bottom: 20px; }
    
    .btn-pro { width: 100%; height: 52px; border-radius: 12px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; font-size: 13px; border: none; }
    .btn-gold { background: var(--gold); color: #000; box-shadow: 0 4px 0 #8e6d35; }
    .btn-dark { background: #334155; color: #cbd5e1; border: 1px solid #475569; }
    .input-pro { background: #fff !important; color: #000 !important; width: 100%; border-radius: 10px; font-weight: 700; height: 44px; text-align: center; border: 2px solid var(--gold); outline: none; font-size: 12px; }
    
    .table-wrapper { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #0f172a; }
    .pro-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
    .pro-table th { background: #1e293b; color: var(--gold); font-size: 7px; padding: 12px 2px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
    .pro-table td { font-size: 8.5px; padding: 12px 2px; border-bottom: 1px solid var(--border); text-align: center; color: #cbd5e1; }
    .hidden { display: none !important; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; background: #16a34a; } }
    .btn-active-shift { animation: blink 0.8s infinite; border: 2px solid #fff !important; background: #16a34a !important; color: white !important; }

    #reportOverlay { background: #f1f5f9; position: fixed; inset: 0; z-index: 2000; padding: 20px; overflow-y: auto; color: #1e293b; }
    .white-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .white-table th { background: #1e293b; color: white; padding: 12px; font-size: 10px; text-align: center; }
    .white-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 11px; text-align: center; color: #334155; }
  </style>
</head>
<body>

<div class="main-container">
  <div id="home" class="py-24 text-center">
    <h1 class="text-4xl font-black text-[#c29851] italic mb-12 uppercase">Kopi Setengah-4</h1>
    <div class="glass-card">
        <button onclick="nav('karyawan')" class="btn-pro btn-gold mb-4">ABSEN MASUK</button>
        <button onclick="nav('admin')" class="btn-pro btn-dark">PANEL ADMIN</button>
    </div>
  </div>

  <div id="karyawan" class="hidden pt-10">
    <button onclick="nav('home')" class="btn-back-global">← Kembali</button>
    <div class="glass-card">
        <p class="text-[10px] text-gold font-bold mb-4 text-center uppercase">Login Karyawan</p>
        <input id="inputID" placeholder="ID (KS4-XXXX)" class="input-pro">
        <button onclick="prosesLogin()" class="btn-pro btn-gold mt-4">MASUK</button>
    </div>
  </div>

  <div id="formAbsen" class="hidden pt-10">
    <button onclick="nav('home')" class="btn-back-global">← Keluar</button>
    <div class="glass-card text-center">
        <h2 id="nameGreeting" class="text-xl font-black text-white uppercase mb-4"></h2>
        <select id="selCabAbsen" class="input-pro mb-6" onchange="updateShiftUI()"><option value="">-- CABANG --</option></select>
        <div id="shiftGrid" class="grid grid-cols-1 gap-4 mb-8"></div>
        <div class="border-t border-slate-700 pt-6">
            <button id="sendBtn" class="btn-pro !bg-green-600 !text-white !h-[64px] opacity-50" disabled>
                <i class="fas fa-paper-plane mr-2"></i> KIRIM ABSEN SEKARANG
            </button>
        </div>
    </div>
  </div>

  <div id="admin" class="hidden pt-10">
    <button onclick="nav('home')" class="btn-back-global">← Kembali</button>
    <div class="glass-card">
        <p class="text-[10px] text-red-500 font-bold mb-4 text-center uppercase">Akses Admin</p>
        <input id="pinAdmin" type="password" placeholder="PIN ADMIN" class="input-pro">
        <button onclick="loginAdmin()" class="btn-pro btn-gold mt-4">MASUK PANEL</button>
    </div>
  </div>

  <div id="dashboard" class="hidden pt-10">
    <button onclick="location.reload()" class="btn-back-global text-red-500">Logout</button>
    
    <div class="glass-card">
        <p class="text-[10px] text-gold font-bold mb-3 uppercase text-center">Rekap Bulanan</p>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <select id="fBulan" class="input-pro"></select>
            <select id="fTahun" class="input-pro"></select>
        </div>
        <button onclick="generateReport()" class="btn-pro btn-gold">LIHAT LAPORAN</button>
    </div>

    <div class="glass-card !p-2">
      <div class="grid grid-cols-2 gap-2 mb-3">
        <select id="selCab" onchange="renderAll()" class="input-pro !h-[38px]"></select>
        <input type="date" id="selTgl" onchange="renderAll()" class="input-pro !h-[38px]">
      </div>
      <div class="table-wrapper">
        <table class="pro-table">
            <thead><tr><th style="width:30%">NAMA</th><th style="width:25%">WAKTU</th><th style="width:15%">LOC</th><th style="width:30%">KET</th></tr></thead>
            <tbody id="tBodyHarian"></tbody>
        </table>
      </div>
    </div>

    <div class="glass-card !p-2">
        <p class="text-[10px] text-red-500 font-bold mb-3 uppercase text-center">Device Manager</p>
        <div class="table-wrapper">
            <table class="pro-table">
                <thead><tr><th style="width:40%">NAMA</th><th style="width:30%">ID HP</th><th style="width:30%">AKSI</th></tr></thead>
                <tbody id="tBodyDevice"></tbody>
            </table>
        </div>
    </div>
  </div>

  <div id="reportOverlay" class="hidden">
    <div class="flex justify-between items-center mb-6">
        <button onclick="nav('dashboard')" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase">← Tutup</button>
        <button onclick="downloadPDF()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase shadow-lg"><i class="fas fa-download mr-2"></i> Download PDF</button>
    </div>
    <div id="pdfContent" class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-slate-900 uppercase italic">KOPI SETENGAH-4</h2>
            <p id="reportTitle" class="text-[12px] font-bold text-slate-500 uppercase mt-1"></p>
        </div>
        <table class="white-table" id="tablePro">
            <thead><tr><th>NAMA KARYAWAN</th><th>CABANG</th><th>HADIR</th><th>TELAT</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
        </table>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, serverTimestamp, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyChFAEgzpZac2yRvkb9r8f0kFT_j_ji1AA", authDomain: "absensi-kopi-setengah-4.firebaseapp.com", databaseURL: "https://absensi-kopi-setengah-4-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "absensi-kopi-setengah-4" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const STAFF = { "KS4-1902":"Adryan", "KS4-7721":"Riki", "KS4-3384":"Acong", "KS4-5510":"Oji", "KS4-8892":"David", "KS4-2104":"Fikri", "KS4-6637":"Rizki", "KS4-4429":"Kimoy", "KS4-9012":"Apin" };
const CABANG = { "Otista": {lat:-6.231607, lng:106.871947, s1:8, s2:15}, "Tanjung Duren": {lat:-6.182202, lng:106.782300, s1:8, s2:15}, "Kebon Jeruk": {lat:-6.210859, lng:106.771180, s1:8, s2:14}, "Pondok Indah": {lat:-6.276248, lng:106.781961, s1:8}, "Menteng": {lat:-6.194873, lng:106.828777, s1:8}, "Cempaka Putih": {lat:-6.176458, lng:106.873310, s1:9} };

const DEVID = localStorage.getItem('ks4_devid') || localStorage.setItem('ks4_devid', 'DEV-'+Math.random().toString(36).substr(2,9).toUpperCase()) || localStorage.getItem('ks4_devid');
let logs = []; let uData = null; window.pnd = null; let currentReportData = [];

window.nav = (id) => {
    document.querySelectorAll('.main-container > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id==='dashboard') startSync();
};

// FIX: LOGIN KARYAWAN FUNCTION
window.prosesLogin = async () => {
    const id = document.getElementById('inputID').value.trim().toUpperCase();
    if(!STAFF[id]) return alert("ID SALAH!");
    const snapLock = await get(ref(db, `locks/${id}`));
    if(snapLock.exists() && snapLock.val() !== DEVID) return alert("DEVICE TERKUNCI!");
    uData = { id, nama: STAFF[id] }; nav('formAbsen');
    document.getElementById('nameGreeting').innerText = uData.nama;
    const s = document.getElementById('selCabAbsen'); s.innerHTML = '<option value="">-- CABANG --</option>';
    Object.keys(CABANG).forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
};

// FIX: SHIFT SELECTION FUNCTIONS
window.updateShiftUI = () => {
    const c = document.getElementById('selCabAbsen').value;
    const g = document.getElementById('shiftGrid'); g.innerHTML = ''; window.pnd = null;
    document.getElementById('sendBtn').disabled = true; document.getElementById('sendBtn').classList.add('opacity-50');
    if(!c) return;
    const ss = CABANG[c].s2 ? [1,2] : [1];
    ss.forEach(n => g.innerHTML += `<button onclick="selS(this, '${c}', ${n})" class="btn-pro btn-dark btn-shift-item">SHIFT ${n}</button>`);
};

window.selS = (btn, cab, n) => {
    document.querySelectorAll('.btn-shift-item').forEach(b => b.classList.remove('btn-active-shift'));
    btn.classList.add('btn-active-shift'); window.pnd = { cab, n };
    document.getElementById('sendBtn').disabled = false; document.getElementById('sendBtn').classList.remove('opacity-50');
};

document.getElementById('sendBtn').onclick = async () => {
    const {cab, n} = window.pnd; const today = new Date().toLocaleDateString('id-ID');
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, CABANG[cab].lat, CABANG[cab].lng);
        if(dist > 0.5) return alert("DI LUAR RADIUS!");
        const now = new Date(); const st = (now.getHours() > CABANG[cab]['s'+n] || (now.getHours() === CABANG[cab]['s'+n] && now.getMinutes() > 0)) ? "TELAT" : "TEPAT";
        await set(ref(db, `locks/${uData.id}`), DEVID);
        await set(push(ref(db, 'absensi')), { idKaryawan: uData.id, nama: uData.nama, cabang: cab, shift: n, tanggal: today, waktu: now.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'}), ket: st, lat: pos.coords.latitude, lng: pos.coords.longitude, timestamp: serverTimestamp() });
        alert("ABSEN BERHASIL!"); location.reload();
    }, () => alert("AKTIFKAN GPS!"), {enableHighAccuracy: true});
};

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ADMIN DASHBOARD
window.loginAdmin = () => { if(document.getElementById('pinAdmin').value==='setengah-4all') nav('dashboard'); else alert("SALAH"); };

function startSync() {
    onValue(ref(db, 'absensi'), (snap) => {
        logs = []; if(snap.exists()) Object.values(snap.val()).forEach(v => logs.push({...v, dt: v.timestamp ? new Date(v.timestamp) : new Date()}));
        renderAll();
    });
    onValue(ref(db, 'locks'), (snap) => {
        const bdy = document.getElementById('tBodyDevice'); bdy.innerHTML = '';
        if(snap.exists()) Object.entries(snap.val()).forEach(([id, dev]) => {
            bdy.innerHTML += `<tr><td class="font-bold text-white uppercase">${STAFF[id] || id}</td><td>${dev.substring(0,8)}</td><td><button onclick="resetD('${id}')" class="bg-red-600 px-2 py-1 rounded text-[8px] font-black uppercase">Reset</button></td></tr>`;
        });
    });
}

window.resetD = async (id) => { if(confirm("Reset device?")) await remove(ref(db, `locks/${id}`)); };

window.generateReport = () => {
    const b = parseInt(document.getElementById('fBulan').value);
    const t = parseInt(document.getElementById('fTahun').value);
    const agg = {};
    logs.filter(l => l.dt.getMonth() === b && l.dt.getFullYear() === t).forEach(l => {
        if(!agg[l.nama]) agg[l.nama] = {nama: l.nama, cab: l.cabang, abs: 0, tlt: 0};
        agg[l.nama].abs++; if(l.ket==='TELAT') agg[l.nama].tlt++;
    });
    currentReportData = Object.values(agg);
    const bName = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"][b];
    document.getElementById('reportTitle').innerText = `Laporan Kehadiran ${bName} ${t}`;
    const bdy = document.getElementById('reportTableBody'); bdy.innerHTML = '';
    currentReportData.forEach(r => { bdy.innerHTML += `<tr><td class="font-bold uppercase text-left pl-6">${r.nama}</td><td>${r.cab}</td><td>${r.abs}</td><td class="font-black text-red-600">${r.tlt}</td></tr>`; });
    nav('reportOverlay');
};

window.downloadPDF = () => {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    const title = document.getElementById('reportTitle').innerText;
    doc.setFontSize(18); doc.text("KOPI SETENGAH-4", 105, 20, {align: 'center'});
    doc.setFontSize(11); doc.text(title, 105, 28, {align: 'center'});
    const rows = currentReportData.map(r => [r.nama, r.cab, r.abs, r.tlt]);
    doc.autoTable({ startY: 35, head: [['NAMA KARYAWAN', 'CABANG', 'TOTAL HADIR', 'TOTAL TELAT']], body: rows, theme: 'grid', headStyles: { fillColor: [30, 41, 59] }});
    doc.save(`Laporan_${title.replace(/ /g,'_')}.pdf`);
};

window.renderAll = () => {
    const bdy = document.getElementById('tBodyHarian');
    const tgl = document.getElementById('selTgl').value || new Date().toLocaleDateString('en-CA');
    const target = new Date(tgl).toLocaleDateString('id-ID');
    const cab = document.getElementById('selCab').value;
    bdy.innerHTML = '';
    logs.filter(l => l.tanggal === target && (cab==='Semua' || l.cabang===cab)).forEach(l => {
        bdy.innerHTML += `<tr><td class="font-bold text-white uppercase">${l.nama}</td><td>${l.waktu}</td><td><a href="https://www.google.com/maps?q=${l.lat},${l.lng}" target="_blank">📍</a></td><td><span class="px-1 py-0.5 rounded text-[7px] font-black ${l.ket==='TELAT'?'bg-red-600':'bg-green-600'}">${l.ket}</span></td></tr>`;
    });
};

// INITIALIZE
const ms = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
ms.forEach((m, i) => document.getElementById('fBulan').innerHTML += `<option value="${i}">${m}</option>`);
[2025, 2026].forEach(y => document.getElementById('fTahun').innerHTML += `<option value="${y}">${y}</option>`);
document.getElementById('fBulan').value = new Date().getMonth();
document.getElementById('fTahun').value = new Date().getFullYear();
document.getElementById('selTgl').value = new Date().toLocaleDateString('en-CA');
const sc = document.getElementById('selCab'); sc.innerHTML = '<option value="Semua">SEMUA CABANG</option>';
Object.keys(CABANG).forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
</script>
</body>
</html>
