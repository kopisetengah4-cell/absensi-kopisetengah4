<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Absensi Kopi Setengah-4 v67</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; min-height: 100vh; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .container-mobile { width: 100%; max-width: 420px; margin: 0 auto; padding: 20px; }

    .card-v67 {
      background: #1e293b; border-radius: 20px; padding: 25px;
      border: 1px solid #334155; width: 100%; margin-bottom: 25px;
      position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    
    .field-v67 { 
      background: #ffffff !important; color: #1e293b !important; 
      width: 100%; border-radius: 12px; font-weight: 800; height: 50px; 
      text-align: center; border: 3px solid #c29851; font-size: 13px; 
      display: block; margin-bottom: 15px; text-transform: uppercase;
    }

    .btn-full { width: 100%; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-weight: 900; transition: 0.2s; }
    .btn-green { background: #22c55e; height: 65px; box-shadow: 0 5px 0 #166534; color: #000; text-transform: uppercase; }
    .btn-green:active { transform: translateY(3px); box-shadow: 0 2px 0 #166534; }
    .btn-opt { background: #334155; height: 55px; border: 1px solid #475569; margin-bottom: 10px; color: #f1f5f9; text-transform: uppercase; font-size: 12px; }

    .table-v67 { width: 100%; table-layout: fixed; border-collapse: collapse; margin-bottom: 35px; }
    .table-v67 th { padding: 10px 2px; color: #c29851; font-size: 8px; border-bottom: 2px solid #334155; text-align: center; text-transform: uppercase; }
    .table-v67 td { padding: 12px 2px; font-size: 9px; border-bottom: 1px solid #334155; text-align: center; font-weight: 600; color: #e2e8f0; word-break: break-word; text-transform: uppercase; }

    .lbl { padding: 3px 5px; border-radius: 4px; font-size: 7px; font-weight: 900; color: white; display: inline-block; }
    .lbl-sukses { background: #16a34a; }
    .lbl-telat { background: #dc2626; }

    .btn-pdf { 
      position: absolute; bottom: 12px; right: 12px; z-index: 50;
      background: #dc2626; color: white; padding: 8px 12px; 
      border-radius: 10px; font-size: 9px; font-weight: 900;
      display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
    }
    .btn-pdf:active { transform: scale(0.9); opacity: 0.8; }

    .section-title { font-size: 10px; font-weight: 900; color: #c29851; margin-bottom: 12px; text-transform: uppercase; border-left: 3px solid #c29851; padding-left: 8px; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="flex justify-center">

<div class="container-mobile">
  <div id="home" class="text-center py-10">
    <h1 class="text-3xl font-black italic text-[#c29851] mb-2 uppercase tracking-tighter">Kopi Setengah-4</h1>
    <p id="clock" class="text-[10px] opacity-60 font-mono mb-10"></p>
    <div class="card-v67">
      <button onclick="nav('karyawan')" class="btn-full btn-green"><i class="fa fa-fingerprint mr-3 text-2xl"></i> MASUK ABSEN</button>
      <button onclick="nav('admin')" class="btn-full btn-opt !mt-6 !h-[50px] opacity-70"><i class="fa fa-lock mr-2"></i> LOGIN ADMIN</button>
    </div>
  </div>

  <div id="karyawan" class="hidden">
    <button onclick="nav('home')" class="mb-5 text-slate-400 font-black text-xs uppercase"><i class="fa fa-arrow-left mr-2"></i> Kembali</button>
    <div class="card-v67"><div id="listCabang"></div><div id="listShift"></div></div>
  </div>

  <div id="admin" class="hidden">
    <button onclick="nav('home')" class="mb-5 text-slate-400 font-black text-xs uppercase"><i class="fa fa-arrow-left mr-2"></i> Kembali</button>
    <div class="card-v67">
        <input id="passAdmin" type="password" placeholder="PASSWORD ADMIN" class="field-v67">
        <button onclick="login()" class="btn-full btn-green !h-[55px]">MASUK</button>
    </div>
  </div>

  <div id="dashboard" class="hidden space-y-6 pb-20">
    <div class="flex justify-between items-center px-1">
      <span class="font-black text-[#c29851] text-xs uppercase">Dashboard v67</span>
      <button onclick="nav('home')" class="text-red-500 font-black text-[10px] uppercase">Logout</button>
    </div>

    <div class="card-v67 !p-4"><canvas id="chartView" style="max-height: 140px;"></canvas></div>

    <div class="card-v67 !p-3">
      <h2 class="section-title">Laporan Harian</h2>
      <div class="flex gap-2 mb-4">
        <select id="selCab" onchange="renderAll()" class="field-v67 !h-[35px] !mb-0 !text-[9px] flex-1"></select>
        <input type="date" id="selTgl" onchange="renderAll()" class="field-v67 !h-[35px] !mb-0 !text-[9px] flex-1">
      </div>
      <table id="tableHarian" class="table-v67">
        <thead><tr><th width="25%">NAMA</th><th width="15%">CABANG</th><th width="20%">TGL</th><th width="12%">JAM</th><th width="13%">SFT</th><th width="15%">STS</th></tr></thead>
        <tbody id="tBodyHarian"></tbody>
      </table>
      <button onclick="exportPDF('Harian', 'tableHarian')" class="btn-pdf"><i class="fa fa-print"></i> PDF</button>
    </div>

    <div class="card-v67 !p-3">
      <h2 class="section-title">Rekap Mingguan</h2>
      <table id="tableMinggu" class="table-v67">
        <thead><tr><th>CABANG</th><th>TOTAL</th><th>TEPAT</th><th>TELAT</th></tr></thead>
        <tbody id="tBodyMingguan"></tbody>
      </table>
      <button onclick="exportPDF('Mingguan', 'tableMinggu')" class="btn-pdf"><i class="fa fa-print"></i> PDF</button>
    </div>

    <div class="card-v67 !p-3">
      <h2 class="section-title">Rekap Bulanan</h2>
      <table id="tableBulan" class="table-v67">
        <thead><tr><th>CABANG</th><th>TOTAL</th><th>TEPAT</th><th>TELAT</th></tr></thead>
        <tbody id="tBodyBulanan"></tbody>
      </table>
      <button onclick="exportPDF('Bulanan', 'tableBulan')" class="btn-pdf"><i class="fa fa-print"></i> PDF</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Konfigurasi Terbaru
const firebaseConfig = {
  apiKey: "AIzaSyChFAEgzpZac2yRvkb9r8f0kFT_j_ji1AA",
  authDomain: "absensi-kopi-setengah-4.firebaseapp.com",
  databaseURL: "https://absensi-kopi-setengah-4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "absensi-kopi-setengah-4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let logs = []; let chart = null;
const cabangArr = ["Tanjung duren", "Otista", "Kebon jeruk", "Pondok indah", "Cempaka putih", "Menteng"];
const aturan = { "Tanjung duren":{s1:8,s2:15}, "Otista":{s1:8,s2:15}, "Kebon jeruk":{s1:8,s2:14}, "Pondok indah":{s1:8}, "Cempaka putih":{s1:9}, "Menteng":{s1:8} };

window.nav = (id) => {
  ['home','karyawan','admin','dashboard'].forEach(x => document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id === 'karyawan') buildCabang();
  if(id === 'dashboard') {
    document.getElementById('selTgl').value = new Date().toISOString().split('T')[0];
    startSync();
  }
};

window.buildCabang = () => {
  const c = document.getElementById('listCabang'); c.innerHTML = '';
  cabangArr.forEach(item => { c.innerHTML += `<button onclick="buildShift('${item}')" class="btn-full btn-opt">${item}</button>`; });
};

window.buildShift = (name) => {
  document.getElementById('listCabang').innerHTML = ''; const s = document.getElementById('listShift');
  const count = aturan[name].s2 ? [1,2] : [1];
  s.innerHTML = `<p class="text-center text-[#c29851] font-black mb-4 uppercase text-xs">${name}</p>`;
  count.forEach(n => { s.innerHTML += `<button onclick="showForm('${name}',${n})" class="btn-full btn-opt !border-[#c29851]">SHIFT ${n}<br><span class="text-[9px] font-normal opacity-50">BATAS: ${aturan[name]['s'+n]}:00 WIB</span></button>`; });
};

window.showForm = (c, sh) => {
  document.getElementById('listShift').innerHTML = `<input id="namaK" placeholder="NAMA" class="field-v67" autofocus><button onclick="simpan('${c}',${sh})" id="btnS" class="btn-full btn-green">KIRIM ABSEN</button>`;
};

window.simpan = async (c, sh) => {
  const n = document.getElementById('namaK').value.trim(); if(!n) return alert("ISI NAMA!");
  const now = new Date(); const tgl = now.toLocaleDateString('id-ID');
  const btn = document.getElementById('btnS'); btn.disabled = true;
  
  onValue(ref(db, 'absensi'), async (snap) => {
    let exist = false;
    if(snap.val()) {
        Object.values(snap.val()).forEach(d => {
            if(d.tanggal === tgl && (d.nama.toLowerCase() === n.toLowerCase() || (d.cabang === c && d.shift === sh))) exist = true;
        });
    }
    if(exist) { alert("ANDA SUDAH ABSEN ATAU SHIFT TERISI!"); btn.disabled = false; return; }

    const status = (now.getHours() > aturan[c]['s'+sh] || (now.getHours() === aturan[c]['s'+sh] && now.getMinutes() > 0)) ? "TELAT" : "TEPAT";
    await set(push(ref(db, 'absensi')), {
        nama: n.toUpperCase(), cabang: c, shift: sh, tanggal: tgl,
        waktu: now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
        ket: status, timestamp: serverTimestamp()
    });
    alert("BERHASIL!"); nav('home');
  }, { onlyOnce: true });
};

function startSync() {
  onValue(ref(db, 'absensi'), (snapshot) => {
    logs = [];
    if(snapshot.val()) {
        Object.values(snapshot.val()).forEach(d => {
            const dt = d.timestamp ? new Date(d.timestamp) : new Date();
            logs.push({...d, dt, iso: dt.toISOString().split('T')[0]});
        });
    }
    renderAll();
  });
}

window.renderAll = () => {
  renderHarian();
  renderRekap('tBodyMingguan', 7);
  renderRekap('tBodyBulanan', 30);
  updateChart();
};

function renderHarian() {
  const b = document.getElementById('tBodyHarian'); b.innerHTML = '';
  const fC = document.getElementById('selCab').value; const fT = document.getElementById('selTgl').value;
  logs.filter(d => (fC === 'Semua' || d.cabang === fC) && d.iso === fT).forEach(d => {
    b.innerHTML += `<tr><td>${d.nama}</td><td>${d.cabang.split(' ')[0]}</td><td>${d.tanggal}</td><td>${d.waktu}</td><td>S${d.shift}</td><td><span class="lbl ${d.ket==='TEPAT'?'lbl-sukses':'lbl-telat'}">${d.ket}</span></td></tr>`;
  });
}

function renderRekap(id, days) {
  const b = document.getElementById(id); b.innerHTML = '';
  const lim = new Date(); lim.setDate(lim.getDate() - days);
  cabangArr.forEach(c => {
    const f = logs.filter(d => d.cabang === c && d.dt >= lim);
    if(f.length > 0) {
      const ok = f.filter(x => x.ket === 'TEPAT').length;
      const no = f.filter(x => x.ket === 'TELAT').length;
      b.innerHTML += `<tr><td>${c}</td><td>${f.length}</td><td class="text-green-400">${ok}</td><td class="text-red-400">${no}</td></tr>`;
    }
  });
}

window.exportPDF = (title, tableId) => {
    const btn = event.currentTarget;
    const oldHtml = btn.innerHTML;
    btn.innerText = "PROSES..."; btn.disabled = true;
    
    setTimeout(() => {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const cab = document.getElementById('selCab').value;

            doc.setFontSize(14);
            doc.setTextColor(194, 152, 81);
            doc.text(`LAPORAN ABSENSI ${title.toUpperCase()}`, 14, 15);
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Cabang: ${cab} | Dicetak: ${new Date().toLocaleString('id-ID')}`, 14, 22);

            doc.autoTable({ 
                html: `#${tableId}`, 
                startY: 28, 
                theme: 'grid', 
                styles: { fontSize: 8, cellPadding: 2, halign: 'center' },
                headStyles: { fillColor: [194, 152, 81] }
            });

            // METODE BLOB UNTUK ANDROID (MENCEGAH FREEZE)
            const pdfBlob = doc.output('blob');
            const url = URL.createObjectURL(pdfBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `KopiSetengah4_${title}_${cab.replace(' ','_')}.pdf`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.innerHTML = oldHtml;
            btn.disabled = false;
        }
    }, 1000);
};

function updateChart() {
  const ctx = document.getElementById('chartView').getContext('2d');
  const labels = []; const ok = []; const fail = [];
  for(let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i); const iso = d.toISOString().split('T')[0];
    labels.push(d.toLocaleDateString('id-ID', {weekday:'short'}));
    ok.push(logs.filter(x => x.iso === iso && x.ket === 'TEPAT').length);
    fail.push(logs.filter(x => x.iso === iso && x.ket === 'TELAT').length);
  }
  if(chart) chart.destroy();
  chart = new Chart(ctx, { type:'bar', data:{labels, datasets:[{label:'TEPAT', data:ok, backgroundColor:'#c29851', borderRadius:5}, {label:'TELAT', data:fail, backgroundColor:'#dc2626', borderRadius:5}]}, options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{display:false}, x:{grid:{display:false}, ticks:{color:'#94a3b8', font:{size:9}}}}}});
}

window.login = () => { if(document.getElementById('passAdmin').value === 'setengah-4all') nav('dashboard'); else alert("PASSWORD SALAH!"); };
const s = document.getElementById('selCab'); s.innerHTML = '<option value="Semua">SEMUA CABANG</option>';
cabangArr.forEach(c => s.innerHTML += `<option value="${c}">${c.toUpperCase()}</option>`);
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('id-ID'); }, 1000);
</script>
</body>
</html>
