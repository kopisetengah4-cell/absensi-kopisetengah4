<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kopi Setengah-4 v88 - Admin Restored</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
    .container-mobile { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; }
    .card-v88 { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .field-v88 { background: #ffffff !important; color: #1e293b !important; width: 100%; border-radius: 12px; font-weight: 800; height: 50px; text-align: center; border: 2px solid #c29851; font-size: 14px; margin-bottom: 12px; }
    .btn-full { width: 100%; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-weight: 900; height: 60px; text-transform: uppercase; transition: 0.2s; }
    .btn-green { background: #22c55e; color: #000; box-shadow: 0 5px 0 #166534; }
    .btn-opt { background: #334155; border: 1px solid #475569; color: #f1f5f9; font-size: 11px; height: 50px; margin-bottom: 10px; }
    
    /* Perbaikan Tabel Admin */
    .table-container { background: #1e293b; border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
    .table-v88 { width: 100%; border-collapse: collapse; background: #1e293b; }
    .table-v88 th { background: #334155; color: #c29851; padding: 12px 5px; font-size: 9px; text-transform: uppercase; font-weight: 900; border-bottom: 2px solid #0f172a; }
    .table-v88 td { padding: 12px 5px; font-size: 10px; border-bottom: 1px solid #334155; text-align: center; font-weight: 600; vertical-align: middle; }
    .lbl { padding: 3px 6px; border-radius: 6px; font-size: 8px; font-weight: 900; color: white; display: inline-block; }
    .lbl-sukses { background: #16a34a; }
    .lbl-telat { background: #dc2626; }
    .lbl-lock { background: #6366f1; color: white; font-family: monospace; }
    
    .section-title { color: #c29851; font-weight: 900; font-size: 11px; text-transform: uppercase; border-left: 4px solid #c29851; padding-left: 10px; margin-bottom: 15px; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="flex justify-center">

<div class="container-mobile">
  <div id="dashboard" class="hidden space-y-6 pb-20">
    <div class="flex justify-between items-center px-1">
      <span class="font-black text-[#c29851] text-[11px] uppercase tracking-wider">Laporan Kehadiran v88</span>
      <button onclick="nav('home')" class="text-red-500 font-black text-[10px] uppercase">Keluar</button>
    </div>

    <div class="card-v88 !p-3">
      <h2 class="section-title">Filter Data</h2>
      <div class="grid grid-cols-2 gap-2 mb-4">
        <select id="selCab" onchange="renderAll()" class="field-v88 !h-[40px] !mb-0 !text-[10px]"></select>
        <input type="date" id="selTgl" onchange="renderAll()" class="field-v88 !h-[40px] !mb-0 !text-[10px]">
      </div>
      
      <div class="table-container">
        <table class="table-v88">
          <thead>
            <tr>
              <th width="30%">KARYAWAN</th>
              <th width="15%">MAPS</th>
              <th width="20%">WAKTU</th>
              <th width="15%">STS</th>
              <th width="20%">DEVICE</th>
            </tr>
          </thead>
          <tbody id="tBodyHarian"></tbody>
        </table>
      </div>
    </div>

    <div class="card-v88 !p-4">
        <h2 class="section-title">Grafik Performa Cabang</h2>
        <canvas id="chartTelat"></canvas>
    </div>
  </div>

  <div id="home" class="text-center py-10">
    <h1 class="text-4xl font-black italic text-[#c29851] mb-2 uppercase tracking-tighter">Kopi Setengah-4</h1>
    <p id="clock" class="text-[10px] opacity-60 font-mono mb-10 tracking-[3px]"></p>
    <div class="card-v88">
      <button onclick="nav('karyawan')" class="btn-full btn-green"><i class="fa fa-fingerprint mr-3"></i> ABSEN SEKARANG</button>
      <button onclick="nav('admin')" class="btn-full btn-opt !mt-8 !h-[45px] opacity-60">DASHBOARD ADMIN</button>
    </div>
  </div>

  <div id="karyawan" class="hidden">
    <button onclick="nav('home')" class="mb-5 text-slate-400 font-black text-xs uppercase"><i class="fa fa-arrow-left mr-2"></i> Kembali</button>
    <div class="card-v88 text-center">
        <h2 class="section-title !border-0 text-center !pl-0">Verifikasi Identitas</h2>
        <input id="inputID" placeholder="ID: KS4-XXXX" class="field-v88">
        <button onclick="prosesLoginID()" class="btn-full btn-green !h-[55px]">MASUK SISTEM</button>
    </div>
  </div>

  <div id="formAbsen" class="hidden">
    <button onclick="nav('karyawan')" class="mb-5 text-slate-400 font-black text-xs uppercase">Ganti ID</button>
    <div class="card-v88">
        <h2 id="userDisplay" class="text-center text-[#c29851] font-black mb-6 uppercase text-lg border-b border-slate-700 pb-4"></h2>
        <select id="selectCabang" class="field-v88 !mb-4" onchange="updateShiftList()">
            <option value="">-- PILIH CABANG ANDA --</option>
        </select>
        <div id="listShift" class="space-y-2"></div>
        <div id="actionArea" class="hidden mt-6">
            <button id="btnKirim" class="btn-full btn-green">KONFIRMASI KEHADIRAN</button>
            <p id="gpsStatus" class="text-[9px] text-center mt-3 font-bold text-yellow-500 hidden animate-pulse">MENYINKRONKAN LOKASI...</p>
        </div>
    </div>
  </div>

  <div id="admin" class="hidden">
    <button onclick="nav('home')" class="mb-5 text-slate-400 font-black text-xs uppercase">Kembali</button>
    <div class="card-v88"><input id="passAdmin" type="password" placeholder="PIN ADMIN" class="field-v88"><button onclick="login()" class="btn-full btn-green !h-[55px]">BUKA LAPORAN</button></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyChFAEgzpZac2yRvkb9r8f0kFT_j_ji1AA", authDomain: "absensi-kopi-setengah-4.firebaseapp.com", databaseURL: "https://absensi-kopi-setengah-4-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "absensi-kopi-setengah-4" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// MASTER DATA v88
const masterKaryawan = {
    "KS4-1902": "ADRYAN", "KS4-7721": "RIKI", "KS4-3384": "ACONG", "KS4-5510": "OJI",
    "KS4-8892": "DAVID", "KS4-2104": "FIKRI", "KS4-6637": "RIZKI", "KS4-4429": "KIMOY", "KS4-9012": "APIN"
};

const lokasiCabang = { "Pondok indah": { lat: -6.276282, lng: 106.782119 }, "Menteng": { lat: -6.194856, lng: 106.828717 }, "Cempaka putih": { lat: -6.176369, lng: 106.873338 }, "Tanjung duren": { lat: -6.182330, lng: 106.782292 }, "Otista": { lat: -6.231648, lng: 106.871980 }, "Kebon jeruk": { lat: -6.210887, lng: 106.771083 } };
const aturan = { "Tanjung duren":{s1:8,s2:15}, "Otista":{s1:8,s2:15}, "Kebon jeruk":{s1:8,s2:14}, "Pondok indah":{s1:8}, "Cempaka putih":{s1:9}, "Menteng":{s1:8} };
let currentUser = null; let logs = []; let myChart = null;

const getDeviceId = () => {
    let id = localStorage.getItem('ks4_device_v88');
    if (!id) {
        id = 'D-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('ks4_device_v88', id);
    }
    return id;
};

window.nav = (id) => {
  ['home','karyawan','formAbsen','admin','dashboard'].forEach(x => document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id === 'formAbsen') buildCabangDropdown();
  if(id === 'dashboard') { startSync(); document.getElementById('selTgl').value = new Date().toISOString().split('T')[0]; }
};

window.prosesLoginID = async () => {
    const idInput = document.getElementById('inputID').value.trim().toUpperCase();
    if (!masterKaryawan[idInput]) return alert("ID TIDAK VALID!");
    const devId = getDeviceId();
    const lockRef = ref(db, `device_locks/${idInput}`);
    const snapshot = await get(lockRef);
    if (snapshot.exists() && snapshot.val() !== devId) return alert("MAAF, ID INI TERKUNCI DI HP LAIN!");
    if (!snapshot.exists()) await set(lockRef, devId);
    currentUser = { id: idInput, nama: masterKaryawan[idInput] };
    nav('formAbsen');
    document.getElementById('userDisplay').innerText = currentUser.nama;
};

window.buildCabangDropdown = () => {
    const s = document.getElementById('selectCabang'); s.innerHTML = '<option value="">-- PILIH CABANG ANDA --</option>';
    Object.keys(lokasiCabang).forEach(c => s.innerHTML += `<option value="${c}">${c.toUpperCase()}</option>`);
};

window.updateShiftList = () => {
    const cab = document.getElementById('selectCabang').value;
    const shArea = document.getElementById('listShift'); shArea.innerHTML = '';
    document.getElementById('actionArea').classList.add('hidden');
    if(!cab) return;
    const shifts = aturan[cab].s2 ? [1,2] : [1];
    shifts.forEach(n => { shArea.innerHTML += `<button onclick="pilihShift('${cab}',${n})" class="btn-full btn-opt">SHIFT ${n} (${aturan[cab]['s'+n]}.00)</button>`; });
};

window.pilihShift = (c, sh) => {
    document.getElementById('listShift').innerHTML = `<p class="text-center font-bold text-xs text-green-400 uppercase tracking-widest bg-green-900/20 py-2 rounded-lg">SHIFT ${sh} DIPILIH</p>`;
    document.getElementById('actionArea').classList.remove('hidden');
    document.getElementById('btnKirim').onclick = () => validateAndSave(c, sh);
};

window.validateAndSave = (c, sh) => {
    document.getElementById('gpsStatus').classList.remove('hidden');
    navigator.geolocation.getCurrentPosition((pos) => {
        const uLat = pos.coords.latitude; const uLng = pos.coords.longitude;
        const target = lokasiCabang[c];
        const dist = Math.round(6371 * (2 * Math.atan2(Math.sqrt(Math.sin(((target.lat-uLat)*Math.PI/180)/2)**2 + Math.cos(uLat*Math.PI/180)*Math.cos(target.lat*Math.PI/180)*Math.sin(((target.lng-uLng)*Math.PI/180)/2)**2), Math.sqrt(1-(Math.sin(((target.lat-uLat)*Math.PI/180)/2)**2 + Math.cos(uLat*Math.PI/180)*Math.cos(target.lat*Math.PI/180)*Math.sin(((target.lng-uLng)*Math.PI/180)/2)**2)))) * 1000);
        if (dist <= 50) simpanAbsen(c, sh, uLat, uLng);
        else { alert(`JARAK TERLALU JAUH (${dist}M). HARUS DI BAWAH 50M.`); nav('home'); }
    }, () => alert("GPS ERROR! HIDUPKAN LOKASI."), { enableHighAccuracy: true });
};

async function simpanAbsen(c, sh, lat, lng) {
    const now = new Date(); const tgl = now.toLocaleDateString('id-ID');
    onValue(ref(db, 'absensi'), async (snap) => {
        let exist = false;
        if(snap.val()) Object.values(snap.val()).forEach(d => { if(d.tanggal === tgl && d.idKaryawan === currentUser.id) exist = true; });
        if(exist) return alert("ANDA SUDAH ABSEN HARI INI!");
        const status = (now.getHours() > aturan[c]['s'+sh] || (now.getHours() === aturan[c]['s'+sh] && now.getMinutes() > 0)) ? "TELAT" : "TEPAT";
        await set(push(ref(db, 'absensi')), { 
            idKaryawan: currentUser.id, nama: currentUser.nama, cabang: c, tanggal: tgl, deviceId: getDeviceId(),
            waktu: now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), ket: status, lat: lat, lng: lng, timestamp: serverTimestamp() 
        });
        alert("BERHASIL DISIMPAN!"); nav('home');
    }, { onlyOnce: true });
}

function startSync() {
  onValue(ref(db, 'absensi'), (snapshot) => {
    logs = []; if(snapshot.val()) Object.values(snapshot.val()).forEach(d => {
      const dt = d.timestamp ? new Date(d.timestamp) : new Date();
      logs.push({...d, dt, iso: dt.toISOString().split('T')[0]});
    });
    renderAll();
  });
}

window.renderAll = () => {
  const fC = document.getElementById('selCab').value; const fT = document.getElementById('selTgl').value;
  const bH = document.getElementById('tBodyHarian'); bH.innerHTML = '';
  logs.filter(d => (fC === 'Semua' || d.cabang === fC) && d.iso === fT).forEach(d => {
    const mapLink = `<a href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank"><i class="fa fa-map-location-dot text-[#c29851] text-lg"></i></a>`;
    bH.innerHTML += `
        <tr>
            <td class="text-left pl-2"><b>${d.nama}</b><br><span class="opacity-50 text-[7px]">${d.idKaryawan}</span></td>
            <td>${mapLink}</td>
            <td>${d.waktu}<br><span class="text-[7px] opacity-40">${d.cabang.split(' ')[0]}</span></td>
            <td><span class="lbl ${d.ket==='TEPAT'?'lbl-sukses':'lbl-telat'}">${d.ket}</span></td>
            <td><span class="lbl lbl-lock">${d.deviceId}</span></td>
        </tr>`;
  });
  updateChart();
};

function updateChart() {
    const ctx = document.getElementById('chartTelat').getContext('2d');
    const l = Object.keys(lokasiCabang).map(c => c.split(' ')[0]);
    const d = Object.keys(lokasiCabang).map(cab => logs.filter(x => x.cabang === cab && x.ket === 'TELAT').length);
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, { type: 'bar', data: { labels: l, datasets: [{ label: 'Keterlambatan', data: d, backgroundColor: '#dc2626' }] }, options: { scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8', font: { size: 9 } } } }, plugins: { legend: { display: false } } } });
}

window.login = () => { if(document.getElementById('passAdmin').value === 'setengah-4all') nav('dashboard'); else alert("AKSES DITOLAK!"); };
const s = document.getElementById('selCab'); s.innerHTML = '<option value="Semua">SEMUA CABANG</option>';
Object.keys(lokasiCabang).forEach(c => s.innerHTML += `<option value="${c}">${c.toUpperCase()}</option>`);
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('id-ID'); }, 1000);
</script>
</body>
  </html>
